version: '3'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile

    volumes:
      - ../..:/workspaces:cached
    working_dir: /workspaces/server/CineMaster-backend
    command: /workspaces/server/CineMaster-backend/bin/Debug/net10.0/CineMaster-backend
    # network_mode: service:db
    ports: 
      - "9000:8080" # Пробрасываем порт: [внешний]:[внутренний в контейнере]
    depends_on: 
      - db
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: unless-stopped
    environment:
      SA_PASSWORD: P@ssw0rd
      ACCEPT_EULA: Y
    ports:
      - "1433:1433"
